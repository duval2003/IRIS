<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse</title>
    <link rel="stylesheet" href="./../asset/css/analyse.css">
</head>
<body>
    <header>
        <h1>Demander une analyse gratuite</h1>
    </header><br/><br/>
    <main>
        <form action="#" method="post">
            <label for="identite"><u>Noms et prenoms</u></label>
            <input type="text" id="identite" name="identite" required="required" placeholder="Noms"> 
            <input type="text" id="identite" name="identite" required="required" placeholder="prenoms"><br/><br/><br/>

            <label for="identite"><u>E-mail</u></label>
            <input type="mail" id="identite" name="identite" required="required" placeholder="example@example">
            <label for="identite"><u>Age</u></label>
            <input type="text" id="identite" name="identite" required="required" placeholder="age" maxlength="2"><br/><br/><br/>
            
            <label for="identite"><u>telephone</u></label>
            <input type="text" id="identite" name="identite" required="required" placeholder="6 -- -- -- --" maxlength="9"><br/><br/><br/>

            <label for="projet"><u>Votre projet</u></label>
            <textarea id="identite" id="projet" name="identite" required="required" rows="20" cols="60"></textarea><br/><br/><br/>
        </form>
    </main><br/><br/>
    <footer>
        <input type="submit" value="SOUMETTRE">
    </footer>
    
</body>
</html>
